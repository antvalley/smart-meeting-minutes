<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>스마트 회의록</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      font-size: 7px;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .container {
      width: 100%;
      min-height: 100vh;
      background: white;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
      padding: 32px 23px;
      text-align: center;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 9px;
      line-height: 1.2;
    }

    .header p {
      font-size: 18px;
      opacity: 0.95;
    }

    .content {
      flex: 1;
      padding: 25px 23px;
      overflow-y: auto;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      font-size: 20px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 11px;
      line-height: 1.3;
    }

    input[type="text"],
    input[type="date"],
    input[type="time"],
    textarea {
      width: 100%;
      padding: 18px 16px;
      border: 3px solid #e5e7eb;
      border-radius: 12px;
      font-size: 18px;
      font-family: inherit;
      background: white;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    textarea {
      resize: vertical;
      min-height: 126px;
      line-height: 1.5;
    }

    .btn {
      width: 100%;
      padding: 20px 23px;
      border: none;
      border-radius: 13px;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 13px;
      -webkit-appearance: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-success {
      background: #10b981;
      color: white;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .recording-status {
      background: #f9fafb;
      border-radius: 16px;
      padding: 32px 23px;
      text-align: center;
      margin-bottom: 25px;
    }

    .timer {
      font-size: 65px;
      font-weight: 700;
      color: #2563eb;
      margin: 25px 0;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }

    .recording-indicator {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      background: #ef4444;
      color: white;
      padding: 14px 25px;
      border-radius: 25px;
      font-size: 18px;
      font-weight: 600;
    }

    .recording-dot {
      width: 11px;
      height: 11px;
      background: white;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .recording-info {
      margin-top: 16px;
      color: #6b7280;
      font-size: 17px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin: 23px 0;
    }

    .photo-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 13px;
      overflow: hidden;
      border: 4px solid transparent;
      transition: all 0.3s;
      background: #f3f4f6;
    }

    .photo-item.selected {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-item .select-indicator {
      position: absolute;
      top: 13px;
      right: 13px;
      width: 29px;
      height: 29px;
      background: white;
      border: 3px solid #d1d5db;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-item.selected .select-indicator {
      background: #2563eb;
      border-color: #2563eb;
    }

    .photo-item.selected .select-indicator::after {
      content: '✓';
      color: white;
      font-size: 18px;
      font-weight: bold;
    }

    .loading {
      text-align: center;
      padding: 50px 23px;
    }

    .spinner {
      width: 63px;
      height: 63px;
      border: 5px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 25px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 18px;
      color: #6b7280;
      margin-top: 16px;
      line-height: 1.5;
    }

    .minutes-preview {
      background: #f9fafb;
      border-radius: 13px;
      padding: 23px;
      margin: 23px 0;
      max-height: 405px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 17px;
      line-height: 1.7;
      color: #374151;
      border: 2px solid #e5e7eb;
    }

    .alert {
      padding: 18px 20px;
      border-radius: 12px;
      margin-bottom: 23px;
      font-size: 18px;
      line-height: 1.6;
    }

    .alert-info {
      background: #dbeafe;
      color: #1e40af;
      border-left: 4px solid #2563eb;
    }

    .alert-success {
      background: #d1fae5;
      color: #065f46;
      border-left: 4px solid #10b981;
    }

    .alert-danger {
      background: #fee2e2;
      color: #991b1b;
      border-left: 4px solid #ef4444;
    }

    .photo-count {
      text-align: center;
      margin: 16px 0;
      font-size: 17px;
      color: #6b7280;
      font-weight: 500;
    }

    .photo-empty {
      text-align: center;
      padding: 50px 23px;
      color: #9ca3af;
      font-size: 17px;
    }

    /* 카메라 모달 */
    .camera-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 1000;
      flex-direction: column;
    }

    .camera-modal.active {
      display: flex;
    }

    .camera-preview {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .camera-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .camera-controls {
      padding: 18px;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .camera-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 3px solid white;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: white;
      cursor: pointer;
    }

    .camera-btn.capture {
      width: 63px;
      height: 63px;
      background: #ef4444;
      border-color: white;
    }

    /* 입력 필드 확대 방지 (iOS) */
    input, textarea, select {
      font-size: 18px !important;
    }

    /* 스크롤바 스타일 */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📝 스마트 회의록</h1>
      <p>AI 기반 자동 회의록 생성</p>
    </div>

    <div class="content">
      <!-- Step 1: 회의 정보 입력 -->
      <div id="step1" class="step active">
        <div class="alert alert-info">
          회의 정보를 입력하고 시작해주세요
        </div>

        <div class="form-group">
          <label for="meetingDate">📅 회의 날짜</label>
          <input type="date" id="meetingDate" required>
        </div>

        <div class="form-group">
          <label for="meetingTime">🕐 회의 시간</label>
          <input type="time" id="meetingTime" required>
        </div>

        <div class="form-group">
          <label for="meetingLocation">📍 회의 장소</label>
          <input type="text" id="meetingLocation" placeholder="예: 합사 회의실" required>
        </div>

        <div class="form-group">
          <label for="meetingAttendees">👥 참석자</label>
          <input type="text" id="meetingAttendees" placeholder="예: 김원경, 조정일, 정동희" required>
        </div>

        <div class="form-group">
          <label for="meetingPurpose">🎯 회의 목적</label>
          <textarea id="meetingPurpose" placeholder="회의 목적을 간단히 작성해주세요" required></textarea>
        </div>

        <button class="btn btn-primary" onclick="startMeeting()">
          회의 시작하기
        </button>
      </div>

      <!-- Step 2: 회의 진행 -->
      <div id="step2" class="step">
        <div class="recording-status">
          <div class="recording-indicator">
            <span class="recording-dot"></span>
            녹음 중
          </div>
          <div class="timer" id="timer">00:00</div>
          <div class="recording-info">회의 내용이 녹음되고 있습니다</div>
        </div>

        <button class="btn btn-primary" onclick="openCamera()">
          📷 사진 촬영하기
        </button>

        <div class="photo-count" id="photoCount">촬영된 사진: 0장</div>
        
        <div id="photoGrid" class="photo-grid"></div>

        <button class="btn btn-danger" onclick="endMeeting()">
          회의 종료하기
        </button>
      </div>

      <!-- Step 3: 사진 선택 -->
      <div id="step3" class="step">
        <div class="alert alert-info">
          회의록에 포함할 사진 1장을 선택해주세요
        </div>

        <div id="photoSelection" class="photo-grid"></div>

        <button class="btn btn-success" onclick="generateMinutes()">
          회의록 생성하기
        </button>
      </div>

      <!-- Step 4: 결과 화면 -->
      <div id="step4" class="step">
        <div id="loadingArea" class="loading">
          <div class="spinner"></div>
          <div class="loading-text">AI가 회의록을 생성하고 있습니다...</div>
          <div class="loading-text" style="font-size: 34px; margin-top: 8px; color: #9ca3af;">
            녹음 파일 업로드 → 음성 전사 → 회의록 작성 순으로 진행됩니다<br>
            (회의 길이에 따라 1~3분 소요될 수 있습니다)
          </div>
        </div>

        <div id="resultArea" style="display: none;">
          <div class="alert alert-success">
            ✅회의록이 성공적으로 생성되었습니다!
          </div>

          <div class="minutes-preview" id="minutesPreview"></div>

          <button class="btn btn-primary" onclick="resetApp()">
            새 회의 시작하기
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 카메라 모달 -->
  <div id="cameraModal" class="camera-modal">
    <div class="camera-preview">
      <video id="cameraVideo" autoplay playsinline muted></video>
    </div>
    <div class="camera-controls">
      <button class="camera-btn" onclick="closeCamera()">✕</button>
      <button class="camera-btn capture" onclick="capturePhoto()">📷</button>
      <button class="camera-btn" onclick="switchCamera()">🔄</button>
    </div>
  </div>

  <script>
    // ============================================
    // 전역 변수
    // ============================================
    let currentStep = 1;
    let recordingStartTime;
    let timerInterval;
    let mediaRecorder;
    let audioChunks = [];
    let photos = [];
    let selectedPhoto = null;
    let audioStream = null;
    let cameraStream = null;
    let currentCamera = 'environment'; // 'user' 또는 'environment'
    let recordedMimeType = 'audio/webm'; // ✅ [수정] 실제 녹음된 MIME 타입 저장용

    // ============================================
    // 로컬 스토리지에 상태 저장
    // ============================================
    function saveState() {
      const state = {
        currentStep,
        recordingStartTime,
        photos,
        meetingData: {
          date: document.getElementById('meetingDate').value,
          time: document.getElementById('meetingTime').value,
          location: document.getElementById('meetingLocation').value,
          attendees: document.getElementById('meetingAttendees').value,
          purpose: document.getElementById('meetingPurpose').value
        }
      };
      sessionStorage.setItem('meetingState', JSON.stringify(state));
    }

    function loadState() {
      const saved = sessionStorage.getItem('meetingState');
      if (saved) {
        const state = JSON.parse(saved);
        currentStep = state.currentStep;
        recordingStartTime = state.recordingStartTime;
        photos = state.photos || [];
        
        if (state.meetingData) {
          document.getElementById('meetingDate').value = state.meetingData.date;
          document.getElementById('meetingTime').value = state.meetingData.time;
          document.getElementById('meetingLocation').value = state.meetingData.location;
          document.getElementById('meetingAttendees').value = state.meetingData.attendees;
          document.getElementById('meetingPurpose').value = state.meetingData.purpose;
        }
      }
    }

    // ============================================
    // Step 관리
    // ============================================
    function showStep(stepNumber) {
      document.querySelectorAll('.step').forEach(step => {
        step.classList.remove('active');
      });
      document.getElementById(`step${stepNumber}`).classList.add('active');
      currentStep = stepNumber;
      window.scrollTo(0, 0);
      saveState();
    }

    // ============================================
    // Step 1: 회의 시작
    // ============================================
    function startMeeting() {
      const date = document.getElementById('meetingDate').value;
      const time = document.getElementById('meetingTime').value;
      const location = document.getElementById('meetingLocation').value;
      const attendees = document.getElementById('meetingAttendees').value;
      const purpose = document.getElementById('meetingPurpose').value;

      if (!date || !time || !location || !attendees || !purpose) {
        alert('모든 항목을 입력해주세요.');
        return;
      }

      saveState();
      startRecording();
      showStep(2);
    }

    // ============================================
    // Step 2: 녹음 및 사진 촬영
    // ============================================

    // ✅ [수정] startRecording() - MIME 타입 자동 감지 + 에러 종류별 메시지 분리
    async function startRecording() {
      try {
        // ① mediaDevices API 지원 여부 체크
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          alert('이 브라우저는 마이크를 지원하지 않습니다.\nChrome 브라우저를 사용해주세요.');
          return;
        }

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioStream = stream;

        // ② 브라우저별 지원 MIME 타입 자동 선택 (우선순위 순)
        let mimeType = '';
        const mimeTypes = [
          'audio/webm;codecs=opus',
          'audio/webm',
          'audio/mp4',
          'audio/ogg;codecs=opus',
          'audio/ogg'
        ];
        for (const type of mimeTypes) {
          if (typeof MediaRecorder !== 'undefined' && MediaRecorder.isTypeSupported(type)) {
            mimeType = type;
            break;
          }
        }

        const options = mimeType ? { mimeType } : {};
        mediaRecorder = new MediaRecorder(stream, options);

        // ③ 실제 사용된 mimeType 저장 (Blob 생성 시 사용)
        recordedMimeType = mediaRecorder.mimeType || mimeType || 'audio/webm';
        console.log('녹음 MIME 타입:', recordedMimeType);

        mediaRecorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            audioChunks.push(event.data);
            // 청크 누적 크기 표시 (디버깅용)
            const totalSize = audioChunks.reduce((sum, c) => sum + c.size, 0);
            console.log(`오디오 청크 누적: ${audioChunks.length}개, 총 크기: ${(totalSize/1024/1024).toFixed(2)}MB`);
          }
        };

        // 10초 간격으로 청크 수집 (1초 간격은 불필요하게 청크가 많아져 처리 오류 유발)
        mediaRecorder.start(10000);
        recordingStartTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);

      } catch (error) {
        console.error('녹음 오류:', error.name, error.message);

        // ④ 에러 종류별 메시지 분리
        if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
          alert('마이크 권한이 거부되었습니다.\n브라우저 주소창 왼쪽 자물쇠(🔒) 아이콘을 눌러\n마이크 권한을 허용해주세요.');
        } else if (error.name === 'NotFoundError') {
          alert('마이크를 찾을 수 없습니다.\n기기에 마이크가 연결되어 있는지 확인해주세요.');
        } else if (error.name === 'NotSupportedError' || error.name === 'NotReadableError') {
          alert('이 브라우저는 녹음 기능을 지원하지 않습니다.\n최신 Chrome 브라우저를 사용해주세요.');
        } else {
          alert('마이크 오류가 발생했습니다.\n오류 코드: ' + error.name + '\n' + error.message);
        }
      }
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
      const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
      const seconds = (elapsed % 60).toString().padStart(2, '0');
      document.getElementById('timer').textContent = `${minutes}:${seconds}`;
    }

    // ============================================
    // 카메라 기능
    // ============================================

    // ✅ [수정] openCamera() - video.play() 명시 호출 + 에러 종류별 메시지 분리
    async function openCamera() {
      try {
        // ① mediaDevices API 지원 여부 체크
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          alert('이 브라우저는 카메라를 지원하지 않습니다.\nChrome 브라우저를 사용해주세요.');
          return;
        }

        const modal = document.getElementById('cameraModal');
        const video = document.getElementById('cameraVideo');

        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: currentCamera },
          audio: false
        });

        video.srcObject = cameraStream;

        // ② 핵심 수정: video.play() 명시적 호출
        //    (브라우저 자동재생 정책 강화로 autoplay 속성만으로는 동작 보장 안됨)
        try {
          await video.play();
        } catch (playError) {
          // play() 실패는 치명적이지 않으므로 경고만 출력하고 계속 진행
          console.warn('video.play() 자동실행 오류 (무시하고 계속):', playError);
        }

        modal.classList.add('active');

      } catch (error) {
        console.error('카메라 오류:', error.name, error.message);

        // ③ 에러 종류별 메시지 분리
        if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
          alert('카메라 권한이 거부되었습니다.\n브라우저 주소창 왼쪽 자물쇠(🔒) 아이콘을 눌러\n카메라 권한을 허용해주세요.');
        } else if (error.name === 'NotFoundError') {
          alert('카메라를 찾을 수 없습니다.\n기기에 카메라가 연결되어 있는지 확인해주세요.');
        } else if (error.name === 'OverconstrainedError') {
          // ④ 후면 카메라 없을 시 전면 카메라로 자동 재시도
          console.warn('요청한 카메라 없음, 전면 카메라로 재시도');
          currentCamera = 'user';
          await openCamera();
        } else {
          alert('카메라 오류가 발생했습니다.\n오류 코드: ' + error.name + '\n' + error.message);
        }
      }
    }

    function closeCamera() {
      const modal = document.getElementById('cameraModal');
      const video = document.getElementById('cameraVideo');
      
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }
      
      video.srcObject = null;
      modal.classList.remove('active');
    }

    function capturePhoto() {
      const video = document.getElementById('cameraVideo');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);
      
      const photoData = canvas.toDataURL('image/jpeg', 0.8);
      photos.push(photoData);
      
      displayPhotos();
      updatePhotoCount();
      closeCamera();
      saveState();
    }

    async function switchCamera() {
      currentCamera = currentCamera === 'environment' ? 'user' : 'environment';
      closeCamera();
      await openCamera();
    }

    function updatePhotoCount() {
      document.getElementById('photoCount').textContent = `촬영된 사진: ${photos.length}장`;
    }

    function displayPhotos() {
      const grid = document.getElementById('photoGrid');
      grid.innerHTML = '';
      
      if (photos.length === 0) {
        grid.innerHTML = '<div class="photo-empty" style="grid-column: 1 / -1;">아직 촬영된 사진이 없습니다</div>';
        return;
      }
      
      photos.forEach((photo, index) => {
        const div = document.createElement('div');
        div.className = 'photo-item';
        div.innerHTML = `<img src="${photo}" alt="회의 사진 ${index + 1}">`;
        grid.appendChild(div);
      });
    }

    function endMeeting() {
      if (photos.length === 0) {
        alert('최소 1장의 사진을 촬영해주세요.');
        return;
      }

      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      
      if (audioStream) {
        audioStream.getTracks().forEach(track => track.stop());
      }
      
      clearInterval(timerInterval);
      
      showPhotoSelection();
      showStep(3);
    }

    // ============================================
    // Step 3: 사진 선택
    // ============================================
    function showPhotoSelection() {
      const selection = document.getElementById('photoSelection');
      selection.innerHTML = '';
      
      photos.forEach((photo, index) => {
        const div = document.createElement('div');
        div.className = 'photo-item';
        div.onclick = () => selectPhoto(index);
        div.innerHTML = `
          <img src="${photo}" alt="사진 ${index + 1}">
          <div class="select-indicator"></div>
        `;
        selection.appendChild(div);
      });
    }

    function selectPhoto(index) {
      selectedPhoto = photos[index];
      
      document.querySelectorAll('#photoSelection .photo-item').forEach((item, i) => {
        if (i === index) {
          item.classList.add('selected');
        } else {
          item.classList.remove('selected');
        }
      });
    }

    // ============================================
    // Step 4: 회의록 생성
    // ============================================
    async function generateMinutes() {
      if (!selectedPhoto) {
        alert('사진을 선택해주세요.');
        return;
      }

      showStep(4);

      // 오디오 Blob 생성
      const audioBlob = new Blob(audioChunks, { type: recordedMimeType || 'audio/webm' });
      const audioSizeMB = (audioBlob.size / 1024 / 1024).toFixed(2);
      console.log(`최종 오디오 크기: ${audioSizeMB}MB, MIME: ${recordedMimeType}`);

      // 로딩 메시지 업데이트
      document.querySelector('#loadingArea .loading-text').textContent =
        `AI가 회의록을 생성하고 있습니다... (오디오 ${audioSizeMB}MB)`;

      const audioBase64 = await blobToBase64(audioBlob);

      const meetingData = {
        date: document.getElementById('meetingDate').value,
        time: document.getElementById('meetingTime').value,
        location: document.getElementById('meetingLocation').value,
        attendees: document.getElementById('meetingAttendees').value,
        purpose: document.getElementById('meetingPurpose').value,
        audioBase64: audioBase64.split(',')[1],
        audioMimeType: recordedMimeType || 'audio/webm',
        photo: selectedPhoto
      };

      console.log('=== 전송할 데이터 ===');
      console.log('date:', meetingData.date);
      console.log('audioMimeType:', meetingData.audioMimeType);
      console.log('audioBase64 길이:', meetingData.audioBase64 ? meetingData.audioBase64.length : 'undefined');
      console.log('photo 있음:', !!meetingData.photo);

      if (!meetingData.date || !meetingData.audioBase64) {
        alert('오류: 데이터가 제대로 생성되지 않았습니다.\ndate: ' + meetingData.date + '\naudio: ' + (meetingData.audioBase64 ? 'OK' : 'NONE'));
        return;
      }

      const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyujvXfa758yakJI6hAzSkn5MmOIuzatjI9sGls-geGnHEHu5GDBaM6we6zGbqIaC-o/exec';

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(meetingData)
        });

        if (!response.ok) {
          throw new Error('서버 응답 오류: ' + response.status);
        }

        const result = await response.json();
        onMinutesGenerated(result);

      } catch (error) {
        onError(error.toString());
      }
    }

    function onMinutesGenerated(result) {
      document.getElementById('loadingArea').style.display = 'none';
      document.getElementById('resultArea').style.display = 'block';
      
      if (result.success) {
        document.getElementById('minutesPreview').textContent = result.minutes;
      } else {
        document.querySelector('#resultArea .alert').className = 'alert alert-danger';
        document.querySelector('#resultArea .alert').textContent = '❌ 오류: ' + result.error;
      }
    }

    function onError(error) {
      document.getElementById('loadingArea').style.display = 'none';
      document.getElementById('resultArea').style.display = 'block';
      document.querySelector('#resultArea .alert').className = 'alert alert-danger';
      document.querySelector('#resultArea .alert').textContent = '❌ 오류: ' + error;
    }

    // ============================================
    // 유틸리티
    // ============================================
    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    function resetApp() {
      if (audioStream) {
        audioStream.getTracks().forEach(track => track.stop());
        audioStream = null;
      }
      
      if (mediaRecorder) {
        if (mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
        }
        mediaRecorder = null;
      }
      
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      
      currentStep = 1;
      audioChunks = [];
      photos = [];
      selectedPhoto = null;
      recordedMimeType = 'audio/webm'; // ✅ [수정] 초기화 추가
      
      document.getElementById('meetingDate').value = '';
      document.getElementById('meetingTime').value = '';
      document.getElementById('meetingLocation').value = '';
      document.getElementById('meetingAttendees').value = '';
      document.getElementById('meetingPurpose').value = '';
      
      sessionStorage.removeItem('meetingState');
      showStep(1);
    }

    // ============================================
    // 초기화
    // ============================================
    window.onload = function() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('meetingDate').value = today;
      
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('meetingTime').value = `${hours}:${minutes}`;
      
      // 저장된 상태 복구
      loadState();
      if (currentStep > 1 && currentStep < 4) {
        showStep(currentStep);
        if (currentStep === 2) {
          displayPhotos();
          updatePhotoCount();
        }
      }
    };

    // 페이지 언로드 시 정리
    window.addEventListener('beforeunload', () => {
      if (audioStream) {
        audioStream.getTracks().forEach(track => track.stop());
      }
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
      }
    });
  </script>
</body>
</html>
