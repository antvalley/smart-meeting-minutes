<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>스마트 회의록</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: #2563eb;
      margin-bottom: 30px;
      font-size: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #374151;
      font-size: 18px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .recording-status {
      background: #f9fafb;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      margin: 20px 0;
      display: none;
    }

    .recording-status.active {
      display: block;
    }

    .timer {
      font-size: 48px;
      font-weight: 700;
      color: #2563eb;
      margin: 20px 0;
    }

    .recording-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
      margin-right: 10px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .hidden {
      display: none;
    }

    .result {
      background: #f9fafb;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
    }

    .loading {
      text-align: center;
      padding: 40px;
    }

    .spinner {
      border: 4px solid #f3f4f6;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 스마트 회의록</h1>

    <!-- 입력 폼 -->
    <div id="inputForm">
      <div class="form-group">
        <label>📅 회의 날짜</label>
        <input type="date" id="meetingDate" required>
      </div>

      <div class="form-group">
        <label>🕐 회의 시간</label>
        <input type="time" id="meetingTime" required>
      </div>

      <div class="form-group">
        <label>📍 회의 장소</label>
        <input type="text" id="meetingLocation" placeholder="예: 본사 3층 회의실" required>
      </div>

      <div class="form-group">
        <label>👥 참석자</label>
        <input type="text" id="meetingAttendees" placeholder="예: 김철수, 이영희" required>
      </div>

      <div class="form-group">
        <label>🎯 회의 목적</label>
        <textarea id="meetingPurpose" placeholder="회의 목적을 간단히 작성" required></textarea>
      </div>

      <button class="btn btn-primary" onclick="startRecording()">🎤 회의 시작하기</button>
    </div>

    <!-- 녹음 중 -->
    <div id="recordingStatus" class="recording-status">
      <div>
        <span class="recording-dot"></span>
        <strong>녹음 중</strong>
      </div>
      <div class="timer" id="timer">00:00</div>
      <p>회의 내용이 녹음되고 있습니다</p>
      <button class="btn btn-danger" onclick="stopRecording()">⏹️ 녹음 종료</button>
    </div>

    <!-- 로딩 -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>AI가 회의록을 생성하고 있습니다...</p>
    </div>

    <!-- 결과 -->
    <div id="result" class="hidden">
      <h2>✅ 회의록 생성 완료!</h2>
      <div id="minutesPreview" class="result"></div>
      <button class="btn btn-primary" onclick="resetApp()">새 회의 시작하기</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyujvXfa758yakJI6hAzSkn5MmOIuzatjI9sGls-geGnHEHu5GDBaM6we6zGbqIaC-o/exec';
    
    let mediaRecorder;
    let audioChunks = [];
    let recordingStartTime;
    let timerInterval;

    // 날짜/시간 초기화
    window.onload = function() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('meetingDate').value = today;
      
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('meetingTime').value = `${hours}:${minutes}`;
    };

    // 녹음 시작
    async function startRecording() {
      // 입력 검증
      const date = document.getElementById('meetingDate').value;
      const time = document.getElementById('meetingTime').value;
      const location = document.getElementById('meetingLocation').value;
      const attendees = document.getElementById('meetingAttendees').value;
      const purpose = document.getElementById('meetingPurpose').value;

      if (!date || !time || !location || !attendees || !purpose) {
        alert('모든 항목을 입력해주세요.');
        return;
      }

      try {
        console.log('🎤 마이크 권한 요청...');
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        console.log('✅ 마이크 권한 승인');

        mediaRecorder = new MediaRecorder(stream);
        
        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
            console.log('📦 오디오 청크 수집:', event.data.size);
          }
        };

        mediaRecorder.start(1000);
        recordingStartTime = Date.now();

        // UI 변경
        document.getElementById('inputForm').classList.add('hidden');
        document.getElementById('recordingStatus').classList.add('active');

        // 타이머 시작
        timerInterval = setInterval(updateTimer, 1000);
        console.log('✅ 녹음 및 타이머 시작');

      } catch (error) {
        console.error('❌ 녹음 오류:', error);
        alert('마이크 권한을 허용해주세요.\n\n설정 → 사이트 설정 → 마이크 → 허용');
      }
    }

    // 타이머 업데이트
    function updateTimer() {
      const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
      const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
      const seconds = (elapsed % 60).toString().padStart(2, '0');
      document.getElementById('timer').textContent = `${minutes}:${seconds}`;
    }

    // 녹음 중지 및 전송
    async function stopRecording() {
      if (!mediaRecorder || mediaRecorder.state === 'inactive') return;

      mediaRecorder.stop();
      clearInterval(timerInterval);

      mediaRecorder.onstop = async () => {
        console.log('✅ 녹음 완료, 처리 시작');

        // UI 변경
        document.getElementById('recordingStatus').classList.remove('active');
        document.getElementById('loading').classList.remove('hidden');

        // 오디오 데이터 변환
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const audioBase64 = await blobToBase64(audioBlob);

        // 데이터 준비
        const meetingData = {
          date: document.getElementById('meetingDate').value,
          time: document.getElementById('meetingTime').value,
          location: document.getElementById('meetingLocation').value,
          attendees: document.getElementById('meetingAttendees').value,
          purpose: document.getElementById('meetingPurpose').value,
          audioBase64: audioBase64.split(',')[1],
          photo: '' // 사진 기능은 일단 제외
        };

        // API 호출
        try {
          console.log('📤 서버로 데이터 전송 중...');
          const response = await fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors', // CORS 우회
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(meetingData)
          });

          // no-cors 모드에서는 응답을 읽을 수 없으므로
          // 성공으로 가정하고 메시지 표시
          showResult('회의록이 생성되어 Google Sheets에 저장되었습니다!\n\n시트를 확인해주세요.');
          
        } catch (error) {
          console.error('❌ 전송 오류:', error);
          showResult('오류: ' + error.message);
        }
      };
    }

    // Base64 변환
    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    // 결과 표시
    function showResult(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');
      document.getElementById('minutesPreview').textContent = message;
    }

    // 초기화
    function resetApp() {
      audioChunks = [];
      document.getElementById('result').classList.add('hidden');
      document.getElementById('inputForm').classList.remove('hidden');
      
      // 폼 리셋
      document.getElementById('meetingLocation').value = '';
      document.getElementById('meetingAttendees').value = '';
      document.getElementById('meetingPurpose').value = '';
    }
  </script>
</body>
</html>
